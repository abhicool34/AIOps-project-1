apiVersion: apps/v1
kind: Deployment
metadata:
    name: ai-demo-app
    labels:
        app: ai-demo-app
        namespace: dev-env
spec: 
    replicas: 1
    selector:
        matchLabels:
            app: ai-demo-app
    template:
        metadata:
            labels:
                app: ai-demo-app
        spec:
            containers:
                - name: ai-demo-app
                  image: python:3.9-slim
                  command: ["/bin/sh"]
                  args:
                    - "-c"
                    - |
                        while true; do
                            echo '{"level":"INFO","message":"App running","service":"demo-app"}'
                            sleep 5
                            echo '{"level":"ERROR","message":"Database connection failed","service":"demo-app"}'
                            sleep 3
                            echo '{"level":"WARNING","message":"High memory usage","service":"demo-app"}
                            sleep 4
                        done
            requests:
                memory: "128Mi"
                cpu: "250m"