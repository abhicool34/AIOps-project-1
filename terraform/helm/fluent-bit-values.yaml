config:
  service: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Daemon       Off
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail    On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name               es
        Match              kube.*
        Host               192.168.220.1
        Port               9200
        Logstash_Format    On
        Logstash_Prefix    logstash
        Suppress_Type_Name On
        Retry_Limit        False
        Replace_Dots       On
        Trace_Error        On

    [OUTPUT]
        Name               es
        Match              host.*
        Host               192.168.220.1
        Port               9200
        Logstash_Format    On
        Logstash_Prefix    node
        Suppress_Type_Name On
        Retry_Limit        False
        Replace_Dots       On

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    memory: 400Mi